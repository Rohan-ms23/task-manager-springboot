<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-placeholder">✓</div>
                <h2>User Registration</h2>
                <p>Create a new account to get started.</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="modern-input" placeholder="Username">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="modern-input" placeholder="Email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="modern-input" placeholder="Password">
                </div>

                <button class="btn-primary w-full" onclick="register()">
                    Register
                </button>
            </div>
            
            <p class="signup-prompt">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

<script>
async function register(){

    const user = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const response = await fetch(
        "http://localhost:8081/auth/register",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(user)
        }
    );

    const result = await response.json();

    alert("User Registered!");
    console.log(result);
}
</script>

</body>
</html>
